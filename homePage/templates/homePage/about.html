{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>About FlatTop</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: black;
        }

        .container {
            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
        }

        .bg-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;

            padding: 12px 20px;
            font-size: 18px;

            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .back-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="{% static 'homePage/FlatTopPoster-1.png' %}" class="bg-img">

        <a href="{% url 'homePage' %}">
            <button class="back-btn">Back</button>
        </a>
    </div>
</body>
</html>
